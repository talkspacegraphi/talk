services:
  - type: web
    name: vortex-messenger
    runtime: node
    plan: free
    buildCommand: |
      npm install
      npx prisma generate --schema=apps/server/prisma/schema.prisma
      npx prisma db push --schema=apps/server/prisma/schema.prisma
      npm run build -w apps/web
      npm run build -w apps/server
    startCommand: node apps/server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vortex-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://vortex-messenger.onrender.com

databases:
  - name: vortex-db
    plan: free
    databaseName: vortex
